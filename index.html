<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประกาศผลสอบเข้า ม.1/ม.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-[#FAFAF9] text-gray-800 flex flex-col items-center justify-start md:justify-center py-8 px-4 md:p-4 relative overflow-x-hidden">

    <div class="fixed inset-0 flex items-center justify-center z-0 pointer-events-none opacity-[0.04] md:opacity-[0.06]">
        <img src="https://scontent-bkk1-1.xx.fbcdn.net/v/t39.30808-6/647366081_1491780026290840_6359285124854972708_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=RFrDfAbVga4Q7kNvwF48niA&_nc_oc=AdqvKyWYOwhNLOkbsKbJ1eS8YxGEjWrFcWy_1aF9jKBHn2cVUQt9yLR3FdwRwdWv6p4&_nc_zt=23&_nc_ht=scontent-bkk1-1.xx&_nc_gid=QcOm1qUyEhNZHZS8aBxAew&_nc_ss=7a3a8&oh=00_AfxHrub5ZX07SVMIFP_klvFUsCiqnTaaMPiAOqaHVlgyAA&oe=69D12C28" alt="โลโก้พื้นหลัง" class="w-[80%] md:w-[50%] max-w-2xl object-contain grayscale-[20%]">
    </div>

    <div class="w-full max-w-4xl bg-white/90 backdrop-blur-sm rounded-3xl shadow-[0_10px_40px_rgb(0,0,0,0.03)] overflow-hidden z-10 border border-amber-100/50 relative transition-all duration-500">
        
        <div class="p-8 md:p-10 text-center relative border-b border-gray-100">
            <img src="https://scontent-bkk1-1.xx.fbcdn.net/v/t39.30808-6/647366081_1491780026290840_6359285124854972708_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=RFrDfAbVga4Q7kNvwF48niA&_nc_oc=AdqvKyWYOwhNLOkbsKbJ1eS8YxGEjWrFcWy_1aF9jKBHn2cVUQt9yLR3FdwRwdWv6p4&_nc_zt=23&_nc_ht=scontent-bkk1-1.xx&_nc_gid=QcOm1qUyEhNZHZS8aBxAew&_nc_ss=7a3a8&oh=00_AfxHrub5ZX07SVMIFP_klvFUsCiqnTaaMPiAOqaHVlgyAA&oe=69D12C28" alt="โลโก้โรงเรียน" class="w-16 h-16 object-contain mx-auto mb-4 rounded-full shadow-sm border border-gray-100">
            
            <h1 class="text-2xl md:text-3xl font-bold text-green-800 mb-2 tracking-wide">ประกาศผลสอบเข้า</h1>
            <p class="text-amber-600 font-medium text-sm md:text-base tracking-wide">ระดับชั้นมัธยมศึกษาปีที่ 1 และ 4</p>
        </div>

        <div class="p-6 md:p-10">
            <div id="searchFormWrapper" class="max-w-md mx-auto">
                <form id="searchForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-green-800 mb-2">รหัสผู้เข้าสอบ</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-user text-xl text-amber-500"></i>
                            </div>
                            <input type="text" id="examId" required
                                class="block w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition-all bg-gray-50/50 outline-none text-gray-700"
                                placeholder="กรอกรหัสผู้เข้าสอบ 5 หลัก">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-green-800 mb-2">รหัสผ่าน <span class="text-xs text-gray-400 font-normal">(เลขประจำตัวประชาชน)</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-lock-key text-xl text-amber-500"></i>
                            </div>
                            <input type="password" id="idCard" required
                                class="block w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition-all bg-gray-50/50 outline-none text-gray-700"
                                placeholder="เลขประจำตัวประชาชน 13 หลัก">
                        </div>
                    </div>

                    <div id="errorMessage" class="hidden p-4 bg-red-50/80 border border-red-100 text-red-600 rounded-2xl text-sm text-center font-medium"></div>

                    <button type="submit" id="submitBtn"
                        class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-amber-500/20 text-base font-bold text-white bg-gradient-to-r from-amber-500 to-amber-400 hover:from-amber-600 hover:to-amber-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-all mt-8 disabled:opacity-50">
                        ตรวจสอบผลคะแนน
                    </button>
                </form>
            </div>

            <div id="resultSection" class="hidden fade-in">
                <div class="flex flex-col md:flex-row gap-8 items-stretch">
                    
                    <div class="w-full md:w-1/3 flex flex-col items-center justify-center text-center p-8 bg-gradient-to-b from-green-50/50 to-white rounded-3xl border border-green-100/50 relative overflow-hidden">
                        <div class="absolute -right-6 -top-6 text-amber-100 opacity-50"><i class="ph ph-student text-9xl"></i></div>
                        
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white mb-5 border border-amber-100 shadow-sm relative z-10">
                            <i class="ph ph-user text-4xl text-green-700"></i>
                        </div>
                        <h2 id="resName" class="text-xl font-bold text-green-900 mb-2 relative z-10">-</h2>
                        <div class="flex flex-col items-center text-sm text-gray-500 gap-1.5 relative z-10">
                            <span class="flex items-center gap-1.5"><i class="ph ph-buildings text-amber-500"></i><span id="resSchool">โรงเรียน: -</span></span>
                        </div>
                        <div class="mt-6 inline-block px-5 py-2 bg-amber-50 text-amber-700 rounded-xl text-sm font-semibold border border-amber-200/50 shadow-sm relative z-10" id="resExamId">
                            รหัสสอบ: -
                        </div>
                        
                        <button type="button" onclick="resetForm()"
                            class="mt-10 w-full flex items-center justify-center gap-2 py-3 px-4 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 bg-white hover:bg-gray-50 hover:text-green-700 transition-colors relative z-10">
                            <i class="ph ph-arrow-left"></i> ค้นหาข้อมูลอื่น
                        </button>
                    </div>

                    <div class="w-full md:w-2/3 flex flex-col justify-between">
                        <div>
                            <h3 class="text-sm font-bold text-amber-600 uppercase tracking-widest flex items-center gap-2 border-b border-gray-100 pb-4 mb-6">
                                <i class="ph ph-exam text-lg"></i> รายละเอียดคะแนน
                            </h3>
                            
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-4">
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:border-amber-300 transition-colors group">
                                    <p class="text-xs text-gray-400 font-medium mb-1 group-hover:text-green-600 transition-colors">วิทยาศาสตร์</p>
                                    <p id="resSci" class="text-2xl font-bold text-gray-800">-</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:border-amber-300 transition-colors group">
                                    <p class="text-xs text-gray-400 font-medium mb-1 group-hover:text-green-600 transition-colors">คณิตศาสตร์</p>
                                    <p id="resMath" class="text-2xl font-bold text-gray-800">-</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:border-amber-300 transition-colors group">
                                    <p class="text-xs text-gray-400 font-medium mb-1 group-hover:text-green-600 transition-colors">ภาษาอังกฤษ</p>
                                    <p id="resEng" class="text-2xl font-bold text-gray-800">-</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:border-amber-300 transition-colors group">
                                    <p class="text-xs text-gray-400 font-medium mb-1 group-hover:text-green-600 transition-colors">ภาษาไทย</p>
                                    <p id="resThai" class="text-2xl font-bold text-gray-800">-</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:border-amber-300 transition-colors group">
                                    <p class="text-xs text-gray-400 font-medium mb-1 group-hover:text-green-600 transition-colors">สังคมศึกษา</p>
                                    <p id="resSocial" class="text-2xl font-bold text-gray-800">-</p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 bg-green-800 p-6 md:p-8 rounded-3xl shadow-xl shadow-green-900/10 text-white flex items-center justify-between relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-r from-green-800 to-green-700 opacity-90"></div>
                            <div class="absolute -right-10 -bottom-10 opacity-10"><i class="ph ph-medal text-9xl text-amber-400"></i></div>
                            
                            <div class="flex items-center gap-4 relative z-10">
                                <div class="p-3 bg-amber-400/20 rounded-2xl border border-amber-400/30 backdrop-blur-sm">
                                    <i class="ph ph-trophy text-3xl text-amber-400"></i>
                                </div>
                                <div>
                                    <div class="text-green-200/80 font-medium text-sm mb-1">Total Score</div>
                                    <div class="text-green-50 font-bold text-lg md:text-xl">คะแนนรวมทั้งหมด</div>
                                </div>
                            </div>
                            <div id="resOverall" class="text-4xl md:text-5xl font-black text-amber-400 drop-shadow-sm relative z-10">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <p class="mt-8 text-xs text-gray-400 z-10 font-medium pb-8 md:pb-0 tracking-wide text-center">
        Powered by School Academic System
    </p>

    <script>
        // 📌📌📌 3. นำ URL ของ Apps Script (ที่ลงท้ายด้วย /exec) มาใส่ตรงนี้ครับ 📌📌📌
        const SCRIPT_URL = "https://script.google.com/macros/s/ใส่รหัสของคุณตรงนี้/exec"; 

        const searchFormWrapper = document.getElementById('searchFormWrapper');
        const searchForm = document.getElementById('searchForm');
        const resultSection = document.getElementById('resultSection');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        searchForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl mr-2"></i> กำลังค้นหา...';

            const examId = document.getElementById('examId').value;
            const idCard = document.getElementById('idCard').value;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ examId: examId, idCard: idCard })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    throw new Error("System Overload");
                }
                
                onSuccess(data);

            } catch (error) {
                console.error("Fetch Error:", error);
                onFailure(error);
            }
        });

        function onSuccess(response) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ตรวจสอบผลคะแนน';

            if (response.status === 'success') {
                const data = response.data;
                document.getElementById('resName').textContent = `${data.prefix}${data.name} ${data.sur}`;
                document.getElementById('resSchool').textContent = `${data.school}`;
                document.getElementById('resExamId').textContent = `รหัสสอบ: ${data.examid}`;
                document.getElementById('resSci').textContent = data.sci;
                document.getElementById('resMath').textContent = data.math;
                document.getElementById('resEng').textContent = data.eng;
                document.getElementById('resThai').textContent = data.thai;
                document.getElementById('resSocial').textContent = data.social;
                document.getElementById('resOverall').textContent = data.overall;

                searchFormWrapper.classList.add('hidden');
                resultSection.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (response.status === 'busy') {
                showError(response.message);
            } else {
                showError(response.message);
            }
        }

        function onFailure(error) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ตรวจสอบผลคะแนน';
            showError("กรุณาเว้นระยะเวลาการเข้าชมผลคะแนน เนื่องจากไม่สามารถรองรับการเข้าชมพร้อมกันจำนวนมากได้");
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('examId').value = '';
            document.getElementById('idCard').value = '';
            errorMessage.classList.add('hidden');
            
            resultSection.classList.add('hidden');
            searchFormWrapper.classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
