<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประกาศผลสอบเข้า ม.1/ม.4</title>
    <!-- เรียกใช้งาน Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้งาน Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- ฟอนต์ Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* สไตล์เสริมสำหรับ Liquid Glass */
        .glass-panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
        .glass-card { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.7); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.8); border-color: rgba(251, 191, 36, 0.8); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-gray-800 flex flex-col items-center justify-start md:justify-center py-8 px-4 md:p-4 relative overflow-x-hidden">

    <!-- แสงออร่าสีเขียวและทอง -->
    <div class="fixed top-[-5%] left-[-5%] w-[40rem] h-[40rem] bg-green-300/40 rounded-full mix-blend-multiply filter blur-[120px] z-0 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[45rem] h-[45rem] bg-amber-200/50 rounded-full mix-blend-multiply filter blur-[120px] z-0 pointer-events-none"></div>

    <!-- โลโก้ตรงกลางที่มองทะลุกระจก (Watermark) -->
    <div class="fixed inset-0 flex items-center justify-center z-0 pointer-events-none">
        <img src="https://placehold.co/800x800/15803d/ffffff?text=LOGO" alt="โลโก้พื้นหลัง" class="w-[65%] md:w-[45%] max-w-md object-contain opacity-30 drop-shadow-2xl">
    </div>

    <!-- กล่องเนื้อหาหลัก (Liquid Glass) -->
    <div class="w-full max-w-4xl glass-panel rounded-[2.5rem] overflow-hidden z-10 relative transition-all duration-500">
        <!-- แสงสะท้อนขอบบนของกระจก -->
        <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white to-transparent opacity-80"></div>

        <!-- ส่วนหัว -->
        <div class="p-8 md:p-10 text-center relative border-b border-white/50">
            <div class="inline-flex items-center justify-center p-3 glass-card rounded-full mb-4 shadow-sm relative">
                <img src="https://placehold.co/100x100/15803d/ffffff?text=LOGO" alt="โลโก้โรงเรียน" class="w-14 h-14 object-contain rounded-full">
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-green-900 mb-2 tracking-tight drop-shadow-sm">ประกาศผลสอบเข้า</h1>
            <p class="text-amber-700 font-semibold text-sm md:text-base tracking-wide bg-white/40 inline-block px-4 py-1 rounded-full border border-white/60">
                ประจำปีการศึกษา 2567
            </p>
        </div>

        <div class="p-6 md:p-10 relative">
            <!-- ฟอร์มค้นหา -->
            <div id="searchFormWrapper" class="max-w-md mx-auto relative z-10">
                <form id="searchForm" class="space-y-6">
                    
                    <!-- Dropdown เลือกประเภทการสอบ -->
                    <div>
                        <label class="block text-sm font-bold text-green-900 mb-2 drop-shadow-sm">ประเภทการสอบ</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-list-dashes text-xl text-green-700"></i>
                            </div>
                            <select id="examType" required class="block w-full pl-12 pr-10 py-4 glass-input rounded-2xl transition-all outline-none text-gray-800 font-medium shadow-inner appearance-none cursor-pointer">
                                <option value="" disabled selected>-- กรุณาเลือกประเภทการสอบ --</option>
                                <option value="m1normal">ม.1 ทั่วไป</option>
                                <option value="m4swk">ม.4 (ม.3 เดิม)</option>
                                <option value="m4general">ม.4 ทั่วไป</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                <i class="ph ph-caret-down text-gray-500 font-bold"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-green-900 mb-2 drop-shadow-sm">รหัสผู้เข้าสอบ</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-user text-xl text-green-700"></i>
                            </div>
                            <input type="text" id="examId" required class="block w-full pl-12 pr-4 py-4 glass-input rounded-2xl transition-all outline-none text-gray-800 font-medium shadow-inner" placeholder="กรอกรหัสผู้เข้าสอบ">
                        </div>
                    </div>

                    <!-- กล่องรหัสผ่าน (จะถูกซ่อนอัตโนมัติถ้าเลือก ม.4 ม.3 เดิม) -->
                    <div id="passwordFieldWrapper" class="transition-all duration-300">
                        <label class="block text-sm font-bold text-green-900 mb-2 drop-shadow-sm">รหัสผ่าน <span class="text-xs text-gray-600 font-medium">(เลขประจำตัวประชาชน)</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-lock-key text-xl text-green-700"></i>
                            </div>
                            <input type="password" id="idCard" required class="block w-full pl-12 pr-4 py-4 glass-input rounded-2xl transition-all outline-none text-gray-800 font-medium shadow-inner" placeholder="เลขประจำตัวประชาชน 13 หลัก">
                        </div>
                    </div>

                    <!-- กล่องแสดงข้อความ Error -->
                    <div id="errorMessage" class="hidden p-4 glass-card bg-red-100/60 border-red-200/80 text-red-700 rounded-2xl text-sm text-center font-bold shadow-sm"></div>

                    <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-4 px-4 rounded-2xl shadow-[0_4px_15px_rgba(245,158,11,0.3)] text-base font-bold text-white bg-gradient-to-r from-amber-500/90 to-amber-400/90 hover:from-amber-500 hover:to-amber-400 border border-amber-300/50 backdrop-blur-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-400 transition-all mt-8 disabled:opacity-50">
                        ตรวจสอบผลคะแนน
                    </button>
                </form>
            </div>

            <!-- หน้าแสดงผลลัพธ์ -->
            <div id="resultSection" class="hidden fade-in relative z-10">
                <div class="flex flex-col md:flex-row gap-8 items-stretch">
                    
                    <!-- ด้านซ้าย: ข้อมูลผู้เข้าสอบ -->
                    <div class="w-full md:w-1/3 flex flex-col items-center justify-center text-center p-8 glass-card rounded-3xl relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white/60 backdrop-blur-md border border-white/80 shadow-sm mb-5 relative z-10">
                            <i class="ph ph-student text-4xl text-green-700"></i>
                        </div>
                        <h2 id="resName" class="text-2xl font-black text-green-900 mb-2 relative z-10 drop-shadow-sm">-</h2>
                        <div class="flex flex-col items-center text-sm text-gray-700 gap-1.5 relative z-10 font-medium">
                            <span class="flex items-center gap-1.5"><i class="ph ph-buildings text-amber-600"></i><span id="resSchool">โรงเรียน: -</span></span>
                        </div>
                        
                        <div class="mt-5 w-full space-y-2">
                            <div class="inline-block w-full px-4 py-2 glass-input text-green-800 rounded-xl text-sm font-bold shadow-sm relative z-10" id="resExamType">ประเภท: -</div>
                            <div class="inline-block w-full px-4 py-2 glass-input text-amber-700 rounded-xl text-sm font-bold shadow-sm relative z-10" id="resExamId">รหัสสอบ: -</div>
                        </div>
                        
                        <button type="button" onclick="resetForm()" class="mt-8 w-full flex items-center justify-center gap-2 py-3 px-4 border border-white/80 rounded-xl text-sm font-bold text-green-800 bg-white/40 hover:bg-white/70 backdrop-blur-sm transition-all relative z-10 shadow-sm">
                            <i class="ph ph-arrow-left"></i> ค้นหาข้อมูลอื่น
                        </button>
                    </div>

                    <!-- ด้านขวา: คะแนนสอบ -->
                    <div class="w-full md:w-2/3 flex flex-col justify-between relative z-10">
                        <div>
                            <h3 class="text-sm font-bold text-amber-700 uppercase tracking-widest flex items-center gap-2 border-b border-white/50 pb-4 mb-6 drop-shadow-sm">
                                <i class="ph ph-exam text-lg"></i> รายละเอียดคะแนน
                            </h3>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-4">
                                <div class="glass-card p-5 rounded-2xl shadow-sm hover:bg-white/50 transition-all duration-300">
                                    <p class="text-xs text-green-800/80 font-bold mb-1">วิทยาศาสตร์</p>
                                    <p id="resSci" class="text-3xl font-black text-gray-800 drop-shadow-sm">-</p>
                                </div>
                                <div class="glass-card p-5 rounded-2xl shadow-sm hover:bg-white/50 transition-all duration-300">
                                    <p class="text-xs text-green-800/80 font-bold mb-1">คณิตศาสตร์</p>
                                    <p id="resMath" class="text-3xl font-black text-gray-800 drop-shadow-sm">-</p>
                                </div>
                                <div class="glass-card p-5 rounded-2xl shadow-sm hover:bg-white/50 transition-all duration-300">
                                    <p class="text-xs text-green-800/80 font-bold mb-1">ภาษาอังกฤษ</p>
                                    <p id="resEng" class="text-3xl font-black text-gray-800 drop-shadow-sm">-</p>
                                </div>
                                <div class="glass-card p-5 rounded-2xl shadow-sm hover:bg-white/50 transition-all duration-300">
                                    <p class="text-xs text-green-800/80 font-bold mb-1">ภาษาไทย</p>
                                    <p id="resThai" class="text-3xl font-black text-gray-800 drop-shadow-sm">-</p>
                                </div>
                                <div class="glass-card p-5 rounded-2xl shadow-sm hover:bg-white/50 transition-all duration-300">
                                    <p class="text-xs text-green-800/80 font-bold mb-1">สังคมศึกษา</p>
                                    <p id="resSocial" class="text-3xl font-black text-gray-800 drop-shadow-sm">-</p>
                                </div>
                            </div>
                        </div>

                        <!-- กล่องคะแนนรวมและอันดับ -->
                        <div class="mt-8 relative overflow-hidden rounded-3xl shadow-xl shadow-green-900/10">
                            <div class="absolute inset-0 bg-green-700/80 backdrop-blur-xl border border-green-400/50"></div>
                            <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/50 to-transparent"></div>
                            <div class="absolute -right-10 -top-10 opacity-20"><i class="ph ph-trophy text-9xl text-white"></i></div>
                            
                            <div class="relative z-10 p-6 md:p-8 flex flex-col sm:flex-row items-center justify-between gap-6">
                                <div class="flex items-center gap-4 w-full sm:w-auto">
                                    <div class="p-3 bg-white/20 rounded-2xl border border-white/30 backdrop-blur-md shadow-inner">
                                        <i class="ph ph-medal text-3xl text-amber-300 drop-shadow-md"></i>
                                    </div>
                                    <div class="text-white font-bold text-lg md:text-xl drop-shadow-md">สรุปผลสอบ</div>
                                </div>

                                <div class="flex items-center gap-6 sm:gap-8 bg-black/20 px-6 py-3 rounded-2xl border border-white/10 w-full sm:w-auto justify-center">
                                    <div class="text-center sm:text-right">
                                        <div class="text-green-200 font-medium text-xs mb-1 tracking-wider uppercase">Rank</div>
                                        <div class="flex items-baseline gap-1 justify-center sm:justify-end">
                                            <span class="text-xl font-bold text-white/80">#</span>
                                            <span id="resRank" class="text-4xl md:text-5xl font-black text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.2)]">-</span>
                                        </div>
                                    </div>
                                    <div class="w-px h-12 bg-white/30 hidden sm:block"></div>
                                    <div class="text-center sm:text-right">
                                        <div class="text-green-200 font-medium text-xs mb-1 tracking-wider uppercase">Total</div>
                                        <div id="resOverall" class="text-4xl md:text-5xl font-black text-amber-300 drop-shadow-[0_2px_10px_rgba(0,0,0,0.2)]">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <p class="mt-8 text-sm text-green-800/60 z-10 font-bold pb-8 md:pb-0 tracking-widest text-center drop-shadow-sm">POWERED BY SCHOOL ACADEMIC SYSTEM</p>

    <!-- Script ติดต่อกับ Google Apps Script -->
    <script>
        // 📌📌📌 นำ URL ของ Apps Script (ที่ลงท้ายด้วย /exec) มาใส่ตรงนี้ 📌📌📌
        const SCRIPT_URL = "https://script.google.com/macros/s/ใส่รหัสของคุณตรงนี้/exec"; 

        const searchFormWrapper = document.getElementById('searchFormWrapper');
        const searchForm = document.getElementById('searchForm');
        const resultSection = document.getElementById('resultSection');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        const examTypeSelect = document.getElementById('examType');
        const passwordFieldWrapper = document.getElementById('passwordFieldWrapper');
        const idCardInput = document.getElementById('idCard');

        // ตรวจสอบเมื่อมีการเปลี่ยนประเภทการสอบ
        examTypeSelect.addEventListener('change', function() {
            // ซ่อนกล่องรหัสผ่านถ้าเลือก ม.4 ม.3 เดิม (m4swk)
            if (this.value === 'm4swk') {
                passwordFieldWrapper.classList.add('hidden');
                idCardInput.required = false;
                idCardInput.value = ''; 
            } else {
                passwordFieldWrapper.classList.remove('hidden');
                idCardInput.required = true;
            }
        });

        searchForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl mr-2"></i> กำลังค้นหา...';

            const examType = document.getElementById('examType').value;
            const examId = document.getElementById('examId').value;
            const idCard = document.getElementById('idCard').value;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ sheetName: examType, examId: examId, idCard: idCard })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    throw new Error("ระบบตอบกลับข้อมูลผิดพลาด กรุณาลองใหม่อีกครั้ง");
                }
                onSuccess(data);

            } catch (error) {
                console.error("Fetch Error:", error);
                onFailure(error);
            }
        });

        function onSuccess(response) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ตรวจสอบผลคะแนน';

            if (response.status === 'success') {
                const data = response.data;
                document.getElementById('resName').textContent = `${data.prefix}${data.name} ${data.sur}`;
                document.getElementById('resSchool').textContent = `${data.school}`;
                
                const dropdownText = document.getElementById('examType').options[document.getElementById('examType').selectedIndex].text;
                document.getElementById('resExamType').textContent = `ประเภท: ${data.examtype !== '-' ? data.examtype : dropdownText}`;
                
                document.getElementById('resExamId').textContent = `รหัสสอบ: ${data.examid}`;
                document.getElementById('resSci').textContent = data.sci;
                document.getElementById('resMath').textContent = data.math;
                document.getElementById('resEng').textContent = data.eng;
                document.getElementById('resThai').textContent = data.thai;
                document.getElementById('resSocial').textContent = data.social;
                document.getElementById('resOverall').textContent = data.overall;
                document.getElementById('resRank').textContent = data.rank;

                searchFormWrapper.classList.add('hidden');
                resultSection.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showError(response.message);
            }
        }

        function onFailure(error) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ตรวจสอบผลคะแนน';
            showError("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง");
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('examId').value = '';
            document.getElementById('idCard').value = '';
            
            document.getElementById('examType').selectedIndex = 0;
            passwordFieldWrapper.classList.remove('hidden');
            idCardInput.required = true;
            
            errorMessage.classList.add('hidden');
            resultSection.classList.add('hidden');
            searchFormWrapper.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
